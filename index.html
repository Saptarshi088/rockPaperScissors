<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0e0e10;
        --surface: #1a1a1f;
        --border: #2a2a35;
        --accent: #00f5c4;
        --accent-dim: rgba(0, 245, 196, 0.12);
        --text: #e8e8f0;
        --muted: #666680;
        --win: #00f5c4;
        --lose: #ff4d6d;
        --tie: #ffd166;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--bg);
        font-family: 'DM Mono', monospace;
        background-image:
          linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        letter-spacing: 0.12em;
        color: var(--text);
        margin-bottom: 8px;
      }

      h1 span { color: var(--accent); }

      .subtitle {
        font-size: 0.7rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 48px;
      }

      .btn-row {
        display: flex;
        gap: 24px;
        margin-bottom: 40px;
      }

      .choice-btn {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--surface);
        font-size: 2.8rem;
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        position: relative;
      }

      .choice-btn:hover {
        transform: translateY(-6px) scale(1.08);
        border-color: var(--accent);
        box-shadow: 0 0 28px rgba(0, 245, 196, 0.3);
      }

      .choice-btn:active {
        transform: translateY(0) scale(0.96);
      }

      .arena {
        display: flex;
        align-items: center;
        gap: 32px;
        margin-bottom: 28px;
        min-height: 90px;
      }

      .arena-emoji {
        font-size: 3.5rem;
        width: 80px;
        text-align: center;
        transition: all 0.3s ease;
      }

      .arena-label {
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--muted);
        text-align: center;
        margin-top: 4px;
      }

      .vs-badge {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.15em;
        color: var(--border);
        padding: 6px 14px;
        border: 2px solid var(--border);
        border-radius: 6px;
      }

      #js-result {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        height: 44px;
        transition: color 0.2s ease;
        color: var(--text);
      }

      #js-result.win  { color: var(--win); }
      #js-result.lose { color: var(--lose); }
      #js-result.tie  { color: var(--tie); }

      #js-score {
        display: flex;
        gap: 0;
        margin-top: 40px;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: var(--surface);
      }

      .score-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 32px;
        gap: 6px;
        border-right: 1px solid var(--border);
      }

      .score-cell:last-child { border-right: none; }

      .score-label {
        font-size: 0.6rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .score-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        letter-spacing: 0.05em;
        line-height: 1;
      }

      .score-cell.win-cell  .score-num { color: var(--win); }
      .score-cell.lose-cell .score-num { color: var(--lose); }
      .score-cell.tie-cell  .score-num { color: var(--tie); }

      #js-reset {
        margin-top: 20px;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
      }

      #js-reset:hover {
        border-color: var(--lose);
        color: var(--lose);
      }

      @keyframes pop {
        0%   { transform: scale(0.85); opacity: 0; }
        60%  { transform: scale(1.06); }
        100% { transform: scale(1);   opacity: 1; }
      }

      .pop { animation: pop 0.25s ease forwards; }
    </style>
  </head>

  <body>
    <h1>Rock <span>&</span> Roll</h1>
    <p class="subtitle">Choose your weapon</p>

    <div class="btn-row">
      <button class="choice-btn" onclick="play('rock')"    title="Rock">✊</button>
      <button class="choice-btn" onclick="play('paper')"   title="Paper">✋</button>
      <button class="choice-btn" onclick="play('scissor')" title="Scissors">✌️</button>
    </div>

    <div class="arena">
      <div>
        <div class="arena-emoji" id="arena-player">❓</div>
        <div class="arena-label">you</div>
      </div>
      <div class="vs-badge">VS</div>
      <div>
        <div class="arena-emoji" id="arena-cpu">❓</div>
        <div class="arena-label">cpu</div>
      </div>
    </div>

    <div id="js-result"></div>

    <div id="js-score">
      <div class="score-cell win-cell">
        <span class="score-label">Wins</span>
        <span class="score-num" id="js-win-num">0</span>
      </div>
      <div class="score-cell tie-cell">
        <span class="score-label">Ties</span>
        <span class="score-num" id="js-tie-num">0</span>
      </div>
      <div class="score-cell lose-cell">
        <span class="score-label">Loses</span>
        <span class="score-num" id="js-lose-num">0</span>
      </div>
    </div>

    <button id="js-reset" onclick="resetScore()">↺ Reset Score</button>

    <script>
      const score = JSON.parse(localStorage.getItem("rps-score")) || { win: 0, lose: 0, tie: 0 };

      const CHOICES = ["rock", "paper", "scissor"];
      const EMOJI   = { rock: "✊", paper: "✋", scissor: "✌️" };
      const BEATS   = { rock: "scissor", paper: "rock", scissor: "paper" };

      const resultEl    = document.getElementById("js-result");
      const arenaPlayer = document.getElementById("arena-player");
      const arenaCpu    = document.getElementById("arena-cpu");
      const winEl       = document.getElementById("js-win-num");
      const loseEl      = document.getElementById("js-lose-num");
      const tieEl       = document.getElementById("js-tie-num");

      updateScoreDisplay();

      function play(player) {
        const cpu = CHOICES[Math.floor(Math.random() * 3)];

        arenaPlayer.textContent = EMOJI[player];
        arenaCpu.textContent    = EMOJI[cpu];

        let outcome;
        if (player === cpu)           outcome = "tie";
        else if (BEATS[player] === cpu) outcome = "win";
        else                           outcome = "lose";

        score[outcome]++;
        localStorage.setItem("rps-score", JSON.stringify(score));
        updateScoreDisplay();

        const labels = { win: "— you win!", lose: "— you lose!", tie: "— it's a tie!" };
        resultEl.className = "";
        void resultEl.offsetWidth;
        resultEl.textContent = `${EMOJI[player]} vs ${EMOJI[cpu]}  ${labels[outcome]}`;
        resultEl.className = `pop ${outcome}`;
      }

      function updateScoreDisplay() {
        winEl.textContent  = score.win;
        loseEl.textContent = score.lose;
        tieEl.textContent  = score.tie;
      }

      function resetScore() {
        score.win = score.lose = score.tie = 0;
        localStorage.setItem("rps-score", JSON.stringify(score));
        updateScoreDisplay();
        resultEl.textContent = "";
        resultEl.className   = "";
        arenaPlayer.textContent = "❓";
        arenaCpu.textContent    = "❓";
      }
    </script>
  </body>
</html>
